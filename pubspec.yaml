name: talq_sdk
description: A standard Flutter SDK for integrating talq into any mobile app.
version: 0.1.1
homepage: https://github.com/hassan247/talq-flutter-sdk

environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: '>=1.17.0'

platforms:
  android:
  ios:

dependencies:
  flutter:
    sdk: flutter
  graphql_flutter: ^5.1.0
  cached_network_image: ^3.3.1
  flutter_secure_storage: ^9.0.0
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  provider: ^6.1.1
  flutter_bloc: ">=8.1.0 <10.0.0"
  equatable: ^2.0.5
  dio: ^5.7.0
  intl: ">=0.19.0 <1.0.0"
  http: ^1.2.0
  image_picker: ^1.1.2
  path: ^1.9.0
  file_picker: ^10.3.8
  url_launcher: ^6.3.2
  uuid: ^4.5.2
  flutter_markdown: ^0.7.3+1
  flutter_svg: ^2.0.10+1
  sticky_headers: ^0.3.0+2
  pdfx: ^2.6.0
  path_provider: ^2.1.3
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/monosend_logo.svg
    - assets/icons/bot-avatar.svg
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/inter/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/inter/Inter-ExtraBold.ttf
          weight: 800
