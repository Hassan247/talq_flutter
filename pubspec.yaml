name: livechat_sdk
description: A standard Flutter SDK for integrating livechat into any mobile app.
version: 0.1.0
homepage: https://github.com/hassan247/livechat-flutter-sdk

environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: '>=1.17.0'

dependencies:
  flutter:
    sdk: flutter
  graphql_flutter: ^5.1.0
  flutter_secure_storage: ^9.0.0
  device_info_plus: ^10.1.0
  firebase_messaging: ^15.0.0
  provider: ^6.1.1
  intl: ^0.19.0
  http: ^1.2.0
  image_picker: ^1.1.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
